function buildComparacion(){
  var meses=Object.values(MONTHS);
  var n=meses.length;
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var year=meses[0].label.split(' ')[1];
  var gridCols='180px '+Array(n).fill('1fr').join(' ');

  function row(label,getter,hb,colorFn){
    var vals=meses.map(getter);
    var nums=vals.map(function(v){return parseFloat(String(v).replace(/[^0-9.-]/g,''));});
    var best=hb?Math.max.apply(null,nums):Math.min.apply(null,nums);
    var cells=vals.map(function(v,i){
      var isBest=nums[i]===best;
      var cls=colorFn?colorFn(nums[i]):'neutral';
      return'<div class="cg-val '+cls+'">'+v+' '+(isBest?'<span class="winner-badge">✓</span>':'')+'</div>';
    }).join('');
    return'<div class="cg-label">'+label+'</div>'+cells;
  }

  var monthHeaders=meses.map(function(m){return'<div class="cg-month">'+m.label+'</div>';}).join('');
  var bestIdx=meses.reduce(function(bi,m,i){return m.scoring>meses[bi].scoring?i:bi;},0);
  var worstIdx=meses.reduce(function(bi,m,i){return m.scoring<meses[bi].scoring?i:bi;},0);
  var bestM=meses[bestIdx], worstM=meses[worstIdx];

  function uColor(v){return v>=66?'good':v>=31?'warn':'bad';}
  function aColor(v){return v<=30?'good':v<=45?'warn':'bad';}
  function cColor(v){return v<=5?'good':v<=10?'warn':'bad';}
  function agColor(v){return v>=90?'good':v>=75?'warn':'bad';}
  function blColor(v){return v>=65?'good':v>=31?'warn':'bad';}
  function caColor(v){return v>=90?'good':v>=80?'warn':'bad';}

  return''+
  '<div class="section-title">Comparación entre meses</div>'+
  '<div class="section-period">'+shortL.join(' · ')+' '+year+' · Centro Quirúrgico Alexander Fleming</div>'+
  '<div class="chart-card" style="margin-bottom:24px">'+
    '<div class="chart-card-title">Indicadores clave — '+shortL.join(' vs ')+' '+year+'</div>'+
    '<div class="chart-card-sub">Comparativa visual de los principales KPIs</div>'+
    '<canvas id="chartComparacion" height="80"></canvas>'+
  '</div>'+
  '<div class="compare-grid" style="grid-template-columns:'+gridCols+'">'+
    '<div class="cg-head">Indicador</div>'+monthHeaders+
    row('Magic Scoring',function(m){return m.scoring;},true,function(){return'neutral';})+
    row('Cirugías realizadas',function(m){return m.cirugias;},true,function(){return'neutral';})+
    row('Utilización (%)',function(m){return m.utilizacion+'%';},true,uColor)+
    row('Cancelación <48hs (%)',function(m){return m.cancelacion+'%';},false,cColor)+
    row('Estimación ONTIME (%)',function(m){return m.estimacion+'%';},true,function(){return'bad';})+
    row('Atraso promedio (min)',function(m){return m.atraso+' min';},false,aColor)+
    row('Cx demoradas (%)',function(m){return m.cxDemoradas+'%';},false,function(){return'bad';})+
    row('Inicio Ontime (%)',function(m){return m.iniciOntime+'%';},true,function(){return'warn';})+
    row('Agendamiento (%)',function(m){return m.agendamiento+'%';},true,agColor)+
    row('Utilización bloques (%)',function(m){return m.bloques+'%';},true,blColor)+
    row('Calidad de datos (%)',function(m){return m.calidad+'%';},true,caColor)+
    row('Cirugías canceladas',function(m){return m.cxCanceladas;},false,function(){return'warn';})+
  '</div>'+
  '<div style="margin-top:20px" class="highlight-box">'+
    '<div class="highlight-title">Veredicto '+shortL.join(' · ')+' '+year+'</div>'+
    '<div class="opp-grid">'+
      '<div><div class="opp-label" style="color:var(--good)">🏆 '+bestM.label+' fue el mejor</div>'+
      '<div class="opp-text">Mayor Magic Scoring ('+bestM.scoring+'), '+bestM.cirugias+' cirugías realizadas, utilización del '+bestM.utilizacion+'% y calidad de datos '+bestM.calidad+'%.</div></div>'+
      '<div><div class="opp-label" style="color:var(--bad)">⚠ '+worstM.label+' fue el más débil</div>'+
      '<div class="opp-text">Menor Magic Scoring ('+worstM.scoring+'), '+worstM.cirugias+' cirugías, cancelación del '+worstM.cancelacion+'% y calidad de datos '+worstM.calidad+'%.</div></div>'+
      '<div><div class="opp-label" style="color:var(--purple)">📈 Tendencia del período</div>'+
      '<div class="opp-text">Magic Scoring: '+meses.map(function(m){return m.scoring;}).join('→')+'. Cirugías: '+meses.map(function(m){return m.cirugias;}).join('→')+'. Utilización: '+meses.map(function(m){return m.utilizacion+'%';}).join('→')+'.</div></div>'+
    '</div>'+
  '</div>';
}


/* ── CIRUJANOS ── */
function nameKey(name){
  var p=name.trim().split(/\s+/);
  // Key = first surname + first char of second word (handles "E." vs "Erik", "F.J." vs "Fernando")
  return (p[0]||'').toLowerCase()+' '+(p[1]?p[1].charAt(0).toLowerCase():'');
}

function buildSurgeonMap(d){
  var map={};
  function merge(rawName){
    var key=nameKey(rawName);
    if(!map[key]){map[key]={name:rawName,key:key};}
    // Prefer the name with more non-abbreviation characters (longer without dots)
    else if(rawName.replace(/\./g,'').length>map[key].name.replace(/\./g,'').length){map[key].name=rawName;}
    return map[key];
  }
  // Base: all surgeons by volume
  if(d.cirujanos)d.cirujanos.forEach(function(r){merge(r[0]).cirugias=r[1];});
  // Block utilization: [name, util%, {asig,plan,util,dentro,fuera}]
  if(d.bloqCirujanos)d.bloqCirujanos.forEach(function(r){
    var s=merge(r[0]);s.bloqPct=r[1];
    if(r[2]){s.bloqAsig=r[2].asig;s.bloqUtil=r[2].util;s.bloqDentro=r[2].dentro;s.bloqFuera=r[2].fuera;}
  });
  // Cancellations: [name, ?, cancelled_count, rate%]
  if(d.cancelaCirujanos)d.cancelaCirujanos.forEach(function(r){
    var s=merge(r[0]);s.cancelaCount=r[2];s.cancelaPct=parseInt(r[3]);
  });
  // Delays: [name, surgeries, pct_string, avg_minutes]
  if(d.atrasosCirujanos)d.atrasosCirujanos.forEach(function(r){
    var s=merge(r[0]);s.atrasoCirugias=r[1];s.atrasoPct=r[2];s.atrasoMin=r[3];
  });
  // Estimation: [name, dur_real_prom, desvio_prom, desvio_acum]
  if(d.estimCirujanos)d.estimCirujanos.forEach(function(r){
    var s=merge(r[0]);s.estimDurReal=r[1];s.estimDesvProm=r[2];s.estimDesvAcum=r[3];
  });
  return map;
}

function buildCirujanos(d){
  var map=buildSurgeonMap(d);
  // Only surgeons present in the cirujanos volume array (excludes specialty blocks like "Urología")
  var surgeons=Object.values(map).filter(function(s){return s.cirugias!=null;});
  surgeons.sort(function(a,b){return (b.cirugias||0)-(a.cirugias||0);});

  function kColor(kpiKey,v){
    var t=THRESHOLDS[kpiKey];if(!t)return'#4a5068';
    return t.higherBetter?(v<t.bad?C.brand:v<t.warn?C.warn:C.good):(v>t.bad?C.brand:v>t.warn?C.warn:C.good);
  }
  var dash='<td style="text-align:center;color:#c7ccd8">—</td>';

  var rows=surgeons.map(function(s){
    var rCx   ='<td style="text-align:center;font-weight:700">'+s.cirugias+'</td>';
    var rBlq  =s.bloqPct!=null?'<td style="text-align:center;font-weight:700;color:'+kColor('bloques',s.bloqPct)+'">'+s.bloqPct+'%</td>':dash;
    var rBlqH =s.bloqAsig!=null?'<td style="text-align:center">'+s.bloqAsig+' hs</td>':dash;
    var rCan  =s.cancelaPct!=null?'<td style="text-align:center;font-weight:700;color:'+kColor('cancelacion',s.cancelaPct)+'">'+s.cancelaPct+'%</td>':dash;
    var rCanN =s.cancelaCount!=null?'<td style="text-align:center;color:#ba0170;font-weight:600">'+s.cancelaCount+'</td>':dash;
    var rAtr  =s.atrasoMin!=null?'<td style="text-align:center;font-weight:700;color:'+kColor('atraso',s.atrasoMin)+'">'+s.atrasoMin+' min</td>':dash;
    var rAtrP =s.atrasoPct!=null?'<td style="text-align:center;color:#ba0170;font-weight:600">'+s.atrasoPct+'</td>':dash;
    var rDesvP=s.estimDesvProm!=null?'<td style="text-align:center;color:#ca8a04;font-weight:600">'+s.estimDesvProm+' min</td>':dash;
    var rDesvA=s.estimDesvAcum!=null?'<td style="text-align:center;font-weight:700;color:#ca8a04">'+Number(s.estimDesvAcum).toLocaleString('es-AR')+' min</td>':dash;
    return'<tr><td class="hl" data-cir="'+s.name.toLowerCase()+'">'+s.name+'</td>'+rCx+rBlq+rBlqH+rCan+rCanN+rAtr+rAtrP+rDesvP+rDesvA+'</tr>';
  }).join('');

  // Cross-month evolution table — surgeons with data in more than one month
  var meses=Object.values(MONTHS);
  var crossMap={};
  meses.forEach(function(mes,mi){
    if(!mes.cirujanos)return;
    mes.cirujanos.forEach(function(r){
      var key=nameKey(r[0]);
      if(!crossMap[key]){crossMap[key]={name:r[0],vals:Array(meses.length).fill(null)};}
      else if(r[0].replace(/\./g,'').length>crossMap[key].name.replace(/\./g,'').length){crossMap[key].name=r[0];}
      crossMap[key].vals[mi]=r[1];
    });
  });
  var crossRows=Object.values(crossMap).filter(function(c){
    return c.vals.filter(function(v){return v!=null;}).length>1;
  }).sort(function(a,b){
    return b.vals.reduce(function(s,v){return s+(v||0);},0)-a.vals.reduce(function(s,v){return s+(v||0);},0);
  });
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var crossHeads=shortL.map(function(l){return'<th style="text-align:center">'+l+'</th>';}).join('');
  var crossBody=crossRows.map(function(c){
    var total=c.vals.reduce(function(s,v){return s+(v||0);},0);
    var cells=c.vals.map(function(v){
      return v!=null?'<td style="text-align:center;font-weight:600">'+v+'</td>':'<td style="text-align:center;color:#c7ccd8">—</td>';
    }).join('');
    return'<tr><td class="hl">'+c.name+'</td>'+cells+'<td style="text-align:center;font-weight:800">'+total+'</td></tr>';
  }).join('');

  var crossSection=crossRows.length>1?(
    '<div style="margin-top:32px;padding-top:24px;border-top:2px solid var(--border)">'+
    '<div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Evolución de volumen por cirujano</div>'+
    '<div style="font-size:12px;font-weight:600;color:var(--text-3);margin-bottom:14px">Cirujanos con actividad en más de un mes · ordenados por total</div>'+
    '<div style="overflow-x:auto"><table class="data-table">'+
    '<thead><tr><th>Cirujano</th>'+crossHeads+'<th style="text-align:center">Total</th></tr></thead>'+
    '<tbody>'+crossBody+'</tbody></table></div></div>'
  ):'';

  return'<div class="section-title">Cirujanos</div>'+
  '<div class="section-period">'+d.label+' · '+d.period+'</div>'+
  '<div style="display:flex;align-items:center;gap:12px;margin:16px 0 10px">'+
    '<input id="cir-search" type="text" placeholder="Buscar cirujano..." oninput="filterCirujanos()"'+
    ' style="font-family:var(--font);font-size:11px;font-weight:600;border:1px solid rgba(186,1,112,.3);border-radius:100px;padding:5px 14px;width:200px;outline:none;color:var(--text-1);"'+
    ' onfocus="this.style.borderColor=\'#ba0170\'" onblur="this.style.borderColor=\'rgba(186,1,112,.3)\'">'+
    '<span id="cir-count" style="font-size:10px;font-weight:700;color:var(--text-3)">'+surgeons.length+' cirujanos</span>'+
  '</div>'+
  '<div style="overflow-x:auto">'+
  '<table class="data-table" id="cir-table">'+
    '<thead><tr>'+
      '<th>Cirujano</th>'+
      '<th style="text-align:center">Cirugías</th>'+
      '<th style="text-align:center">Util. bloque</th>'+
      '<th style="text-align:center">Hs asignadas</th>'+
      '<th style="text-align:center">% Cancelac.</th>'+
      '<th style="text-align:center">Canceladas</th>'+
      '<th style="text-align:center">Atraso prom.</th>'+
      '<th style="text-align:center">% Demoradas</th>'+
      '<th style="text-align:center">Desvío prom.</th>'+
      '<th style="text-align:center">Desvío acum.</th>'+
    '</tr></thead>'+
    '<tbody id="cir-body">'+rows+'</tbody>'+
  '</table></div>'+
  crossSection;
}

function filterCirujanos(){
  var q=(document.getElementById('cir-search').value||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  var rows=document.querySelectorAll('#cir-body tr');
  var visible=0;
  rows.forEach(function(tr){
    var cell=tr.querySelector('[data-cir]');
    var nm=(cell?cell.getAttribute('data-cir'):'').normalize('NFD').replace(/[̀-ͯ]/g,'');
    var show=!q||nm.indexOf(q)>=0;
    tr.style.display=show?'':'none';
    if(show)visible++;
  });
  var cnt=document.getElementById('cir-count');
  if(cnt)cnt.textContent=visible+' cirujanos';
}

/* ── RENDER ── */
function renderSection(section,month){
  const d=MONTHS[month];
  const main=document.getElementById('main-content');
  switch(section){
    case 'resumenAnual':     main.innerHTML=buildResumenAnual();break;
    case 'resumen':       main.innerHTML=buildResumen(d);break;
    case 'evolucion':     main.innerHTML=buildEvolucion();break;
    case 'volumen':       main.innerHTML=buildVolumen(d);break;
    case 'utilizacion':   main.innerHTML=buildUtilizacion(d);break;
    case 'cancelaciones': main.innerHTML=buildCancelaciones(d);break;
    case 'estimaciones':  main.innerHTML=buildEstimaciones(d);break;
    case 'atrasos':       main.innerHTML=buildAtrasos(d);break;
    case 'bloques':       main.innerHTML=buildBloques(d);break;
    case 'agendamiento':  main.innerHTML=buildAgendamiento(d);break;
    case 'calidad':       main.innerHTML=buildCalidad(d);break;
    case 'cirujanos':     main.innerHTML=buildCirujanos(d);break;
  }
  requestAnimationFrame(()=>buildCharts(section,d));
}

/* ── NAV ── */
let currentMonth='ene2026',currentSection='resumen';

function switchToAnual(el){
  currentSection='resumenAnual';
  document.querySelectorAll('.month-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.querySelectorAll('.section-tab,.trimestre-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelector('.section-bar').style.display='none';
  renderSection('resumenAnual',currentMonth);
}

function switchMonth(month,el){
  currentMonth=month;
  document.querySelectorAll('.month-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.querySelector('.section-bar').style.display='';
  // Si estaba en resumen anual, volver a Resumen mensual
  if(currentSection==='resumenAnual'){
    currentSection='resumen';
    var firstTab=document.querySelector('.section-tab');
    if(firstTab) firstTab.classList.add('active');
  }
  document.querySelectorAll('.trimestre-tab').forEach(function(t){t.classList.remove('active');});
  if(currentSection!=='evolucion'&&currentSection!=='comparacion'&&currentSection!=='resumenAnual'){
    renderSection(currentSection,currentMonth);
  }
}

function switchSection(section,el){
  currentSection=section;
  document.querySelectorAll('.section-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.trimestre-tab').forEach(t=>t.classList.remove('active'));
  renderSection(currentSection,currentMonth);
}

function switchTrimestre(section,el){
  currentSection=section;
  // Deactivate monthly section tabs
  document.querySelectorAll('.section-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.trimestre-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSection(section, currentMonth);
}

function exportPDF(){
  const d=MONTHS[currentMonth];
  const name=`IAF_MCA_${d.label.replace(' ','_')}_${currentSection}.pdf`;

  const hideEls=document.querySelectorAll('.header,.month-bar,.section-bar,.trimestre-bar');
  hideEls.forEach(e=>e.style.display='none');
  document.body.style.background='#fff';

  const pdfHeader=document.createElement('div');
  pdfHeader.id='pdf-header-temp';
  pdfHeader.style.cssText='padding:12px 0 16px 0;border-bottom:3px solid #ba0170;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;';
  pdfHeader.innerHTML=`<div style="display:flex;align-items:center;gap:14px;"><div style="font-size:22px;font-weight:900;color:#ba0170;letter-spacing:-1px;">M·C·A</div><div style="width:1px;height:24px;background:#ddd;"></div><div><div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;">Instituto Alexander Fleming</div><div style="font-size:9px;font-weight:400;color:#8b93a8;letter-spacing:1px;text-transform:uppercase;">Magic Calendar Analytics</div></div></div><div style="text-align:right;font-size:9px;font-weight:600;color:#8b93a8;letter-spacing:.5px;text-transform:uppercase;">${d.label} &middot; ${currentSection.charAt(0).toUpperCase()+currentSection.slice(1)}<br>Generado ${new Date().toLocaleDateString('es-AR')}</div>`;

  const main=document.getElementById('main-content');
  main.insertBefore(pdfHeader,main.firstChild);

  const opt={
    margin:[10,10,10,10],
    filename:name,
    image:{type:'jpeg',quality:.97},
    html2canvas:{scale:2,useCORS:true,logging:false,windowWidth:document.documentElement.scrollWidth,scrollY:0,backgroundColor:'#ffffff'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    pagebreak:{mode:['avoid-all','css','legacy']}
  };

  html2pdf().set(opt).from(main).save().then(()=>{
    hideEls.forEach(e=>e.style.display='');
    document.body.style.background='';
    const h=document.getElementById('pdf-header-temp');
    if(h) h.remove();
  });
}

  } else {
    showLock();
  }
});

async function sha256(text){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
