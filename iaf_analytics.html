<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas Centro Quirúrgico — IAF</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --brand:#ba0170;--brand-pale:#f9eef5;
  --bg:#f4f5f7;--white:#ffffff;
  --border:#e2e5ea;--border-2:#d0d4dc;
  --text-1:#1a1d24;--text-2:#4a5068;--text-3:#8b93a8;
  --good:#0d7a4e;--good-bg:#eaf7f2;
  --bad:#ca8a04;--bad-bg:#fefce8;
  --warn:#ba0170;--warn-bg:#fdf0f7;
  --purple:#5b4fcf;
  --radius:10px;--radius-sm:6px;
  --font:'Montserrat','Calibri','Trebuchet MS',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text-1);font-family:var(--font);min-height:100vh;font-size:14px;line-height:1.5;overflow-x:hidden;}

/* ── HEADER ── */
.header{background:var(--white);border-bottom:3px solid var(--brand);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.logo-area{display:flex;align-items:center;gap:16px;}
.brand-mark{font-size:26px;font-weight:900;color:var(--brand);letter-spacing:-1px;}
.divider-v{width:1px;height:28px;background:var(--border-2);}
.inst-name{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text-1);text-transform:uppercase;line-height:1.3;}
.inst-sub{font-size:10px;font-weight:400;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:12px;}
.last-update{font-size:10px;font-weight:500;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;}
.btn-pdf{background:var(--brand);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .18s;}
.btn-pdf:hover{background:var(--brand-dark, #8f0055);}
.btn-admin{background:transparent;color:var(--brand);border:1px solid var(--brand);border-radius:6px;padding:7px 14px;font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all .18s;}
.btn-admin:hover{background:var(--brand-pale);}

/* ── MONTH / SECTION BARS ── */
.month-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;gap:2px;overflow-x:auto;}
.month-tab{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;color:var(--text-3);transition:all .18s;white-space:nowrap;}
.month-tab:hover{color:var(--text-2);}
.month-tab.active{color:var(--brand);border-bottom-color:var(--brand);}
.month-tab.disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--good);margin-left:6px;vertical-align:middle;margin-top:-2px;}
.section-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 32px;display:flex;overflow-x:auto;}
.section-tab{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 11px;cursor:pointer;color:var(--text-3);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;}
.section-tab:hover{color:var(--text-2);}
.section-tab.active{color:var(--brand);border-bottom-color:var(--brand);background:var(--white);}

/* ── LAYOUT ── */
.main{padding:28px 32px;max-width:100%;overflow-x:hidden;}
.section-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:2px;}
.section-period{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:24px;display:flex;align-items:center;gap:8px;}
.section-period::before{content:'';display:inline-block;width:24px;height:2px;background:var(--brand);}

/* ── SCORE BANNER ── */
.score-banner{display:grid;grid-template-columns:180px 1fr;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.score-main{background:var(--brand);padding:24px;display:flex;flex-direction:column;justify-content:center;}
.score-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:8px;}
.score-value{font-size:56px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px;}
.score-perf{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.85);margin-top:8px;}
.score-kpis{display:grid;grid-template-columns:repeat(9,1fr);}
.kpi-cell{padding:14px 10px;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
.kpi-cell-label{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:5px;line-height:1.3;}
.kpi-cell-val{font-size:18px;font-weight:800;letter-spacing:-.5px;}
.kpi-cell-val.good{color:var(--good);}.kpi-cell-val.bad{color:var(--bad);}.kpi-cell-val.neutral{color:var(--text-1);}.kpi-cell-val.warn{color:var(--warn);}

/* ── SEMÁFORO CARD ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .18s;min-width:0;word-break:break-word;}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);}
.card-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--brand);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.card-tag::before{content:'';display:inline-block;width:16px;height:2px;background:var(--brand);flex-shrink:0;}
.card-tag.teal::before{background:var(--good);}.card-tag.teal{color:var(--good);}
.card-tag.purple::before{background:var(--purple);}.card-tag.purple{color:var(--purple);}
.card-tag.warn::before{background:var(--warn);}.card-tag.warn{color:var(--warn);}
.card-metric{font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px;margin-bottom:4px;}
.card-metric.good{color:var(--good);}.card-metric.bad{color:var(--bad);}.card-metric.warn{color:var(--warn);}.card-metric.neutral{color:var(--text-1);}
.card-desc{font-size:12px;font-weight:600;color:var(--text-2);}
.card-sub{font-size:11px;font-weight:400;color:var(--text-3);margin-top:5px;}
.card-delta{font-size:11px;font-weight:700;margin-top:4px;}
.card-delta.up{color:var(--good);}.card-delta.down{color:var(--bad);}

/* ── SEMÁFORO TRACK ── */
.semaforo-wrap{margin-top:10px;}
.semaforo-label{display:flex;justify-content:space-between;font-size:9px;font-weight:600;color:var(--text-3);margin-bottom:4px;}
.semaforo-track{height:6px;border-radius:6px;background:linear-gradient(to right,#ba0170,#b45309,#0d7a4e);position:relative;overflow:visible;}
.semaforo-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.semaforo-track.inv{background:linear-gradient(to right,#0d7a4e,#b45309,#ba0170);}

/* ── CHART CARDS ── */
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);min-width:0;}
.chart-card-title{font-size:13px;font-weight:700;color:var(--text-1);margin-bottom:2px;}
.chart-card-sub{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:18px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}

/* ── QUIROFANOS ── */
.quirofano-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;}
.q-card.best{border-color:var(--good);background:var(--good-bg);}
.q-card.worst{border-color:var(--bad);background:var(--bad-bg);}
.q-card.mid{border-color:var(--warn);background:var(--warn-bg);}
.q-name{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;}
.q-pct{font-size:24px;font-weight:900;letter-spacing:-1px;margin-bottom:8px;}
.q-bar{background:var(--border);border-radius:4px;height:5px;overflow:hidden;}
.q-fill{height:100%;border-radius:4px;}

/* ── TABLES ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-2);font-weight:500;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--bg);}
.hl{color:var(--text-1);font-weight:700;}.bad-val{color:var(--bad);font-weight:700;}.good-val{color:var(--good);font-weight:700;}.warn-val{color:var(--warn);font-weight:700;}

/* ── HIGHLIGHT / OPP ── */
.highlight-box{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--brand);border-radius:var(--radius);padding:18px 22px;margin-bottom:20px;}
.highlight-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--brand);margin-bottom:12px;}
.opp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.opp-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.opp-text{font-size:12px;font-weight:500;color:var(--text-2);line-height:1.6;}

/* ── ALERTAS ── */
.alert-panel{margin-bottom:24px;}
.alert-item{display:flex;align-items:flex-start;gap:12px;background:var(--white);border:1px solid var(--border);border-left:4px solid;border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.alert-item.alert-red{border-left-color:var(--bad);}
.alert-item.alert-warn{border-left-color:var(--warn);}
.alert-item.alert-info{border-left-color:var(--purple);}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-body{}
.alert-title{font-size:12px;font-weight:700;color:var(--text-1);margin-bottom:3px;}
.alert-desc{font-size:11px;font-weight:500;color:var(--text-2);line-height:1.5;}
.alert-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:100px;margin-right:6px;}
.badge-red{background:var(--bad-bg);color:var(--bad);}
.badge-warn{background:var(--warn-bg);color:var(--warn);}
.badge-info{background:rgba(91,79,207,.1);color:var(--purple);}

/* ── COMPARE GRID ── */
.compare-grid{display:grid;grid-template-columns:180px 1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.cg-head{background:var(--bg);padding:11px 14px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);display:flex;align-items:center;}
.cg-month{background:var(--white);padding:11px 14px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--brand);display:flex;align-items:center;justify-content:center;text-align:center;}
.cg-label{background:var(--bg);padding:10px 14px;font-size:11px;font-weight:600;color:var(--text-2);display:flex;align-items:center;}
.cg-val{background:var(--white);padding:10px 14px;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;}
.cg-val.good{color:var(--good);}.cg-val.bad{color:var(--bad);}.cg-val.warn{color:var(--warn);}.cg-val.neutral{color:var(--text-1);}
.winner-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:100px;background:var(--good-bg);color:var(--good);}

/* ── EVOLUTION KPIS ── */
.evo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
  .evo-cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}

canvas{max-height:260px;}

  /* ── TRIMESTRE BAR ── */
  .trimestre-bar{background:linear-gradient(135deg,#1a0d14,#2a0f22);border-bottom:2px solid var(--brand);padding:0 16px;display:flex;flex-wrap:wrap;align-items:center;gap:0;}
  .trimestre-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(186,1,112,.7);padding:0 12px 0 0;border-right:1px solid rgba(186,1,112,.25);margin-right:8px;white-space:nowrap;}
  .trimestre-tab{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 16px;cursor:pointer;color:rgba(255,255,255,.5);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;}
  .trimestre-tab:hover{color:rgba(255,255,255,.8);}
  .trimestre-tab.active{color:#fff;border-bottom-color:var(--brand);background:rgba(186,1,112,.12);}

.data-table th.sortable{cursor:pointer;user-select:none;transition:color .15s;white-space:nowrap;}
.data-table th.sortable:hover{color:var(--brand);}
.data-table th.sort-active{color:var(--brand);}
.sort-icon{display:inline-block;margin-left:4px;opacity:.45;font-size:9px;font-style:normal;line-height:1;vertical-align:middle;}
.sort-icon.active{opacity:1;color:var(--brand);}

/* ── VOLUMEN KPI BAR ── */
.vol-kpi-bar{display:flex;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap;}
.vol-kpi-item{flex:1;min-width:120px;padding:16px 18px;display:flex;flex-direction:column;gap:3px;}
.vol-kpi-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b93a8;}
.vol-kpi-val{font-size:28px;font-weight:900;letter-spacing:-1px;color:#1a1d24;line-height:1.1;}
.vol-kpi-sub{font-size:10px;font-weight:500;color:#8b93a8;}
.vol-kpi-sep{width:1px;background:var(--border);flex-shrink:0;margin:12px 0;}
@media(max-width:600px){
  .vol-kpi-bar{flex-direction:column;}
  .vol-kpi-sep{width:100%;height:1px;margin:0;}
  .vol-kpi-item{
    display:grid;
    grid-template-columns:1fr auto;
    grid-template-rows:auto auto;
    align-items:center;
    padding:11px 16px;
    gap:1px 12px;
  }
  .vol-kpi-label{grid-column:1;grid-row:1;font-size:10px;letter-spacing:.5px;align-self:end;}
  .vol-kpi-val{grid-column:2;grid-row:1/3;font-size:24px;align-self:center;text-align:right;}
  .vol-kpi-sub{grid-column:1;grid-row:2;font-size:10px;align-self:start;}
}


@media(max-width:900px){
  .main{padding:20px;}
  .score-kpis{grid-template-columns:repeat(3,1fr);}
  .charts-row,.opp-grid,.evo-grid,.evo-cards-grid{grid-template-columns:1fr;}
  .quirofano-grid{grid-template-columns:repeat(3,1fr);}
  .cards-grid{grid-template-columns:repeat(2,1fr)!important;}
  .compare-grid{grid-template-columns:130px 1fr 1fr 1fr;}
}
@media(max-width:600px){
  .header{padding:0 14px;height:52px;}
  .brand-mark{font-size:22px;}
  .inst-name{font-size:10px;letter-spacing:0;}
  .inst-sub,.last-update,.divider-v{display:none;}
  .btn-pdf span{display:none;}
  .month-bar,.section-bar{padding:0 8px;-webkit-overflow-scrolling:touch;}
  .month-tab{padding:10px 12px;font-size:10px;letter-spacing:1px;}
  .section-tab{padding:7px 9px;font-size:9px;letter-spacing:0.5px;}
  .trimestre-tab{padding:8px 12px;font-size:9px;letter-spacing:0.5px;}
  
  .main{padding:14px;}
  .section-title{font-size:18px;}
  .section-period{font-size:9px;margin-bottom:14px;}
  .score-banner{grid-template-columns:1fr;}
  .score-main{padding:16px 18px;flex-direction:row;align-items:center;justify-content:space-between;}
  .score-value{font-size:44px;}
  .score-kpis{grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);}
  .kpi-cell{padding:10px 6px;}
  .kpi-cell-label{font-size:8px;}
  .kpi-cell-val{font-size:15px;}
  .cards-grid{grid-template-columns:1fr 1fr!important;gap:10px;margin-bottom:14px;}
  .card{padding:12px;}
  .card-metric{font-size:26px;}
  .card-desc{font-size:11px;}
  .chart-card{padding:14px;margin-bottom:12px;}
  .chart-card-title{font-size:12px;}
  .chart-card-sub{margin-bottom:10px;}
  .charts-row{gap:12px;margin-bottom:12px;}
  canvas{max-height:190px;}
  .quirofano-grid{grid-template-columns:repeat(3,1fr);gap:8px;}
  .q-pct{font-size:18px;}
  .highlight-box{padding:14px;}
  .opp-grid{grid-template-columns:1fr;gap:12px;}
  .compare-grid{grid-template-columns:1fr;gap:0;}
  .cg-head{display:none;}
  .cg-month{padding:8px 12px;font-size:11px;justify-content:flex-start;}
  .cg-label{padding:8px 12px;font-size:10px;}
  .cg-val{padding:8px 12px;justify-content:flex-start;font-size:11px;}
  [style*="grid-template-columns:repeat(4"],[style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(2,1fr)!important;}
  .evo-grid{grid-template-columns:1fr!important;}
}
@media(max-width:600px){
  #cardUtilDia #chartUtilDia{height:160px!important;}
  .util-dia-table th,.util-dia-table td{padding:7px 8px;font-size:11px;}
  .util-dia-table td[style*="font-size:14px"]{font-size:12px!important;}
  /* Volumen KPI bar mobile */
  .vol-kpi-bar{flex-direction:column;}
  .vol-kpi-sep{width:100%;height:1px;margin:0;}
  .vol-kpi-item{flex-direction:row;align-items:center;justify-content:space-between;padding:11px 16px;}
  .vol-kpi-val{font-size:22px;}
  /* Volumen: override mobile canvas cap */
  #chartAreas,#chartProcs,#chartCirujanos,#chartInstrumental{max-height:none!important;}
  #chartAreas{height:340px!important;}
  #chartProcs{height:220px!important;}
  #chartCirujanos{height:220px!important;}
  #chartInstrumental{height:180px!important;}
}
@media(max-width:380px){
  .cards-grid{grid-template-columns:1fr!important;}
  .score-kpis{grid-template-columns:repeat(2,1fr);}
  .quirofano-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo-area">
    <div class="brand-mark" style="font-size:13px;letter-spacing:0;">Estadísticas CQ</div>
    <div class="divider-v"></div>
    <div>
      <div class="inst-name">Instituto Alexander Fleming</div>
      <div class="inst-sub">Centro Quirúrgico</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-update">Última carga: 07/04/2026</span>
    <a href="iaf_admin.html" class="btn-admin">⚙ Admin</a>
    <button class="btn-pdf" onclick="exportPDF()">⬇ <span>Descargar PDF</span></button>
  </div>
</header>

<div class="month-bar" id="month-bar">
  <div class="month-tab active" id="anual-tab" onclick="switchToAnual(this)" style="font-weight:800;color:var(--brand)">2026</div>
</div>

<div class="section-bar">
  <div class="section-tab active" onclick="switchSection('resumen',this)">Resumen</div>
  <div class="section-tab" onclick="switchSection('volumen',this)">Volumen</div>
  <div class="section-tab" onclick="switchSection('utilizacion',this)">Utilización</div>
  <div class="section-tab" onclick="switchSection('bloques',this)">Bloques</div>
  <div class="section-tab" onclick="switchSection('atrasos',this)">Atrasos</div>
  <div class="section-tab" onclick="switchSection('agendamiento',this)">Agendamiento</div>
  <div class="section-tab" onclick="switchSection('cancelaciones',this)">Cancelaciones</div>
  <div class="section-tab" onclick="switchSection('estimaciones',this)">Estimaciones</div>
  <div class="section-tab" onclick="switchSection('calidad',this)">Calidad</div>
  <div class="section-tab" onclick="switchSection('cirujanos',this)">Cirujanos</div>

/* ── LOAD months from API (si está configurada) ── */
// Keys hardcoded in this file — captured once before any API call
var HARDCODED_KEYS={};
Object.keys(MONTHS).forEach(function(k){HARDCODED_KEYS[k]=true;});

async function loadMonthsFromApi(){
  var apiUrl=(localStorage.getItem('IAF_API_URL')||'').replace(/\/$/,'');
  if(!apiUrl)return;
  try{
    var rows=await fetch(apiUrl+'/months').then(function(r){return r.json();});
    var apiKeys={};
    for(var i=0;i<rows.length;i++)apiKeys[rows[i].key]=true;

    // Push hardcoded months that are missing from the API (first time only)
    var localKeys=Object.keys(HARDCODED_KEYS);
    for(var i=0;i<localKeys.length;i++){
      var k=localKeys[i];
      if(!apiKeys[k]){
        try{
          await fetch(apiUrl+'/months/'+encodeURIComponent(k),{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(MONTHS[k])
          });
        }catch(e2){}
      }
    }

    // Always load/refresh months from the API (picks up new or edited months)
    var changed=false;
    for(var i=0;i<rows.length;i++){
      var key=rows[i].key;
      if(HARDCODED_KEYS[key])continue; // keep hardcoded data as-is
      var data=await fetch(apiUrl+'/months/'+encodeURIComponent(key)).then(function(r){return r.json();});
      MONTHS[key]=data;
      changed=true;
    }
    // Remove months deleted from the API (non-hardcoded only)
    Object.keys(MONTHS).forEach(function(k){
      if(!HARDCODED_KEYS[k]&&!apiKeys[k]){delete MONTHS[k];changed=true;}
    });
    buildMonthBar();
    if(changed)renderSection(currentSection,currentMonth);
  }catch(e){}
}

/* ── Build month bar dynamically ── */
function buildMonthBar(){
  var bar=document.getElementById('month-bar');
  if(!bar)return;
  var existing=bar.querySelectorAll('.month-tab:not(#anual-tab)');
  for(var i=0;i<existing.length;i++){existing[i].remove();}
  Object.keys(MONTHS).forEach(function(key){
    var m=MONTHS[key];
    var lbl=m.label||key;
    var idx=lbl.indexOf(' ');
    var shortLbl=idx>0?lbl.substring(0,3)+lbl.slice(idx):lbl;
    var tab=document.createElement('div');
    tab.className='month-tab';
    tab.setAttribute('onclick',"switchMonth('"+key+"',this)");
    tab.innerHTML=shortLbl+' <span class="dot"></span>';
    bar.appendChild(tab);
  });
}

function semaforoHtml(kpiKey, value){
  const t=THRESHOLDS[kpiKey]; if(!t)return'';
  const pct=Math.min(100,Math.max(0,(value-t.min)/(t.max-t.min)*100));
  const color=t.higherBetter?(value<t.bad?C.brand:value<t.warn?C.warn:C.good):(value>t.bad?C.brand:value>t.warn?C.warn:C.good);
  const inv=!t.higherBetter?'inv':'';

/* ── SORT TRIMESTRAL TABLES ── */
function sortTable(tableId, colIdx){
  var table=document.getElementById(tableId);
  if(!table) return;
  var tbody=table.querySelector('tbody');
  var allRows=Array.prototype.slice.call(tbody.querySelectorAll('tr'));
  var pinned=allRows.filter(function(r){return r.dataset.pinned==='true';});
  var rows=allRows.filter(function(r){return r.dataset.pinned!=='true';});

  var prevCol=parseInt(table.dataset.sortCol||'-1');
  var prevDir=table.dataset.sortDir||'desc';
  var newDir=(prevCol===colIdx && prevDir==='desc')?'asc':'desc';
  table.dataset.sortCol=colIdx;
  table.dataset.sortDir=newDir;

  function val(r){
    var cell=r.cells[colIdx];
    var txt=cell?cell.textContent:'';
    txt=txt.trim().replace(/[%+\s]/g,'').replace('pp','').replace('—','');
    var n=parseFloat(txt);
    return isNaN(n)?txt.toLowerCase():n;
  }

  rows.sort(function(a,b){
    var av=val(a), bv=val(b);
    if(av===''||av===undefined) return 1;
    if(bv===''||bv===undefined) return -1;
    var cmp=(typeof av==='number'&&typeof bv==='number')?av-bv:(av<bv?-1:av>bv?1:0);
    return newDir==='asc'?cmp:-cmp;
  });

  table.querySelectorAll('th.sortable').forEach(function(th,i){
    var icon=th.querySelector('.sort-icon');
    if(!icon) return;
    th.classList.toggle('sort-active',i===colIdx);
    icon.textContent=i===colIdx?(newDir==='asc'?' ▲':' ▼'):' ⇅';
    icon.classList.toggle('active',i===colIdx);
  });

  rows.concat(pinned).forEach(function(r){tbody.appendChild(r);});
}

function calcIAFScore(d){
  var pesos={util:0.25,cancela:0.15,agend:0.15,bloques:0.15,estim:0.10,calidad:0.10,atraso:0.05,dem:0.05};
  function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
  var s={};
  s.util    = clamp(d.utilizacion/66,0,1);
  s.cancela = d.cancelacion<=5?1:d.cancelacion>=20?0:clamp((20-d.cancelacion)/15,0,1);
  s.agend   = clamp(d.agendamiento/90,0,1);
  s.bloques = clamp(d.bloques/65,0,1);
  s.estim   = clamp(d.estimacion/40,0,1);
  s.calidad = clamp((d.calidad-80)/10,0,1);
  s.atraso  = d.atraso<=30?1:d.atraso>=60?0:clamp((60-d.atraso)/30,0,1);
  s.dem     = d.cxDemoradas<=50?1:d.cxDemoradas>=80?0:clamp((80-d.cxDemoradas)/30,0,1);
  var total=0;
  for(var k in pesos) total+=pesos[k]*s[k];
  return{score:Math.round(total*100)/10, breakdown:s};
}

function iafScoreGauge(score){
  var color=score>=8?'#0d7a4e':score>=6?'#ca8a04':'#ba0170';
  var label=score>=8?'ALTO':score>=6?'MEDIO':'BAJO';
  // SVG semicircle gauge
  var pct=score/10;
  var angle=pct*180; // 0-180 degrees
  var rad=(angle-90)*Math.PI/180;
  var cx=80,cy=80,r=60;
  var ex=cx+r*Math.cos(rad);
  var ey=cy+r*Math.sin(rad);
  var largeArc=angle>180?1:0;
  var trackPath='M 20,80 A 60,60 0 0,1 140,80';
  var fillPath='M 20,80 A 60,60 0 '+largeArc+',1 '+ex.toFixed(1)+','+ey.toFixed(1);
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8b93a8;margin-bottom:2px">IAF Score</div>
    <svg viewBox="0 0 160 90" width="160" height="90" style="overflow:visible">
      <path d="${trackPath}" fill="none" stroke="#e5e7eb" stroke-width="14" stroke-linecap="round"/>
      <path d="${fillPath}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"/>
      <text x="80" y="72" text-anchor="middle" font-size="28" font-weight="900" fill="${color}" font-family="Montserrat,sans-serif">${score.toFixed(1)}</text>
      <text x="80" y="86" text-anchor="middle" font-size="9" font-weight="700" fill="${color}" font-family="Montserrat,sans-serif" letter-spacing="1">${label}</text>
      <text x="18" y="95" text-anchor="middle" font-size="8" fill="#8b93a8" font-family="Montserrat,sans-serif">0</text>
      <text x="142" y="95" text-anchor="middle" font-size="8" fill="#8b93a8" font-family="Montserrat,sans-serif">10</text>
    </svg>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;width:100%;margin-top:4px">
      ${[
        ['Util.',Math.round(score>=0?(d=>d.utilizacion/66*25)(window._iafD||{})||0:0)+'%','util'],
        ['Cancela.',Math.round(0)+'%','cancela'],
        ['Agend.',Math.round(0)+'%','agend'],
        ['Bloques',Math.round(0)+'%','bloques'],
      ].map(function(){return'';}).join('')}
    </div>
  </div>`;
}

function buildEvolucion(){
  const kpis=[
    {id:'evoCirc',    title:'Cirugías realizadas',          sub:'Volumen mensual · Q1–Q6',                       unit:'cx',   umbral:null,  color:'brand',  vals:[503,395,556]},

    {id:'evoAtraso',  title:'Atraso promedio total',        sub:'Umbral ideal: ≤30 min · Menor es mejor',       unit:'min',  umbral:30,    color:'brand',  vals:[50,44,45], inverted:true},
    {id:'evoAgend',   title:'Tasa de agendamiento',         sub:'Umbral ideal: ≥90%',                           unit:'%',    umbral:90,    color:'good',   vals:[91.7,90.1,91.2]},
    {id:'evoCancela', title:'Tasa de cancelación <48hs',    sub:'Umbral ideal: ≤5% · Menor es mejor',           unit:'%',    umbral:5,     color:'brand',  vals:[7,9,8],   inverted:true},
    {id:'evoEstim',   title:'Estimación ONTIME',            sub:'Umbral ideal: ≥40% · % de cirugías estimadas correctamente',unit:'%',umbral:40,color:'purple',vals:[23,21,23]},
    {id:'evoCalidad', title:'Calidad de datos',             sub:'Umbral ideal: ≥90% · % cirugías con data completa',unit:'%',umbral:90,   color:'good',   vals:[97.4,96.2,98.7]},
    {id:'evoScoring', title:'Magic Scoring',                 sub:'Escala 0–8 pts · Performance global del proceso',unit:'pts', umbral:null,  color:'purple', vals:[1,2,3]},
  ];

  function colorOf(kpi){
    const v=kpi.vals, u=kpi.umbral, inv=kpi.inverted;
    return v.map(val=>{
      if(u===null) return kpi.color==='brand'?C.brandA:kpi.color==='good'?C.goodA:kpi.color==='purple'?C.purpleA:C.warnA;
      const ok=inv?val<=u:val>=u;
      return ok?C.goodA:C.brandA;
    });
  }

  const cards=kpis.map(k=>{
    const best=k.inverted?Math.min(...k.vals):Math.max(...k.vals);
    const worst=k.inverted?Math.max(...k.vals):Math.min(...k.vals);
    const delta=((k.vals[2]-k.vals[0])/Math.abs(k.vals[0])*100).toFixed(1);
    const deltaDir=k.inverted?(k.vals[2]<k.vals[0]?'↓ Mejora':'↑ Empeora'):(k.vals[2]>k.vals[0]?'↑ Mejora':'↓ Empeora');
    const deltaColor=k.inverted?(k.vals[2]<k.vals[0]?'var(--good)':'var(--bad)'):(k.vals[2]>k.vals[0]?'var(--good)':'var(--bad)');
    const umbralLine=k.umbral?`<div style="font-size:10px;font-weight:600;color:var(--text-3);margin-top:6px;">Umbral: <span style="color:var(--warn);font-weight:700;">${k.umbral}${k.unit}</span></div>`:'';
    return`<div class="chart-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <div>
          <div class="chart-card-title">${k.title}</div>
          <div class="chart-card-sub">${k.sub}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:16px;">
          <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;">Ene→Mar</div>
          <div style="font-size:13px;font-weight:800;color:${deltaColor}">${deltaDir} ${Math.abs(delta)}%</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:14px;">
        ${['Ene','Feb','Mar'].map((m,i)=>{
          const v=k.vals[i];
          const isBest=v===best, isWorst=v===worst;
          const bg=isBest?'var(--good-bg)':isWorst?'var(--bad-bg)':'var(--bg)';
          const fg=isBest?'var(--good)':isWorst?'var(--bad)':'var(--text-1)';
          const badge=isBest?'<span style="font-size:8px;background:var(--good);color:#fff;padding:1px 5px;border-radius:100px;margin-left:4px;">✓</span>':isWorst?'<span style="font-size:8px;background:var(--bad);color:#fff;padding:1px 5px;border-radius:100px;margin-left:4px;">✗</span>':'';
          return`<div style="flex:1;background:${bg};border-radius:6px;padding:10px;text-align:center;border:1px solid var(--border);">
            <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;">${m} 2026</div>
            <div style="font-size:20px;font-weight:900;color:${fg};letter-spacing:-0.5px;">${v}<span style="font-size:11px;font-weight:600;">${k.unit}</span>${badge}</div>
          </div>`;
        }).join('')}
      </div>
      ${umbralLine}
      <canvas id="${k.id}" height="90" style="margin-top:12px"></canvas>
    </div>`;
  }).join('');

  return`
  <div class="section-title">Evolución del Trimestre</div>
  <div class="section-period">Enero · Febrero · Marzo 2026 · Cada KPI por separado</div>
  <div class="evo-cards-grid">
    ${cards}
  </div>`;
}

function buildVolumenTrimestral(){
  const meses=Object.values(MONTHS);
  const n=meses.length;
  const shortL=meses.map(m=>m.label.split(' ')[0]);
  const year=meses[0].label.split(' ')[1];

  function mergeTable(getter, tableId, title, sub, unit=''){
    const map={};
    meses.forEach((mes,mi)=>{
      getter(mes).forEach(r=>{
        const key=r[0];
        if(!map[key]) map[key]={nombre:key,vals:Array(n).fill(null)};
        map[key].vals[mi]=r[1];
      });
    });
    const sorted=Object.values(map).sort((a,b)=>{
      const ta=a.vals.reduce((s,v)=>s+(v||0),0);
      const tb=b.vals.reduce((s,v)=>s+(v||0),0);
      return tb-ta;
    });
    const rows=sorted.map(item=>{
      const total=item.vals.reduce((s,v)=>s+(v||0),0);
      const cells=item.vals.map(v=>v===null?'<td style="text-align:center;color:#8b93a8">—</td>':`<td style="text-align:center;font-weight:700">${v}${unit}</td>`).join('');
      return`<tr><td class="hl">${item.nombre}</td>${cells}<td style="text-align:center;font-weight:800;font-size:14px;color:#ba0170">${total}${unit}</td></tr>`;
    }).join('');
    const thMeses=shortL.map((l,i)=>`<th class="sortable" onclick="sortTable('${tableId}',${i+1})" style="text-align:center">${l}<span class="sort-icon"> ⇅</span></th>`).join('');
    return`
    <div class="chart-card" style="margin-top:20px">
      <div class="chart-card-title">${title}</div>
      <div class="chart-card-sub">${sub} · Click en columna para ordenar</div>
      <div style="overflow-x:auto">
      <table class="data-table" id="${tableId}" style="min-width:420px">
        <thead><tr>
          <th class="sortable sort-active" onclick="sortTable('${tableId}',0)" style="text-align:left">Nombre<span class="sort-icon active"> ▼</span></th>
          ${thMeses}
          <th class="sortable" onclick="sortTable('${tableId}',${n+1})" style="text-align:center">Total<span class="sort-icon"> ⇅</span></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>`;
  }

  // Áreas: convertir % a cantidad
  const areasG=mes=>mes.areas.map(r=>[r[0],Math.round(mes.cirugias*r[1]/100)]);

  return`
  <div style="margin-top:28px;padding-top:24px;border-top:2px solid var(--border)">
    <div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Resumen del período · Volumen</div>
    <div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:24px;height:2px;background:#ba0170"></span>${shortL.join(' · ')} ${year}</div>
  </div>
  ${mergeTable(areasG, 'tblVolAreasTrim', 'Áreas de especialidad', `Cirugías por área · ${shortL[0]}→${shortL[n-1]}`,' cx')}
  ${mergeTable(m=>m.procs, 'tblVolProcsTrim', 'Procedimientos', `Cantidad por procedimiento · ${shortL[0]}→${shortL[n-1]}`)}
  ${mergeTable(m=>m.cirujanos, 'tblVolCirTrim', 'Cirujanos por volumen', `Procedimientos por cirujano · ${shortL[0]}→${shortL[n-1]}`)}
  ${mergeTable(m=>m.instrumental, 'tblVolInstTrim', 'Instrumental', `Usos por equipo · ${shortL[0]}→${shortL[n-1]}`)}`;
}

function buildVolumen(d){
  const isAnterior=d.deltaCirc!==null;
  const maxCx=d.cirujanos[0]?d.cirujanos[0][1]:1;
  const maxInst=d.instrumental[0]?d.instrumental[0][1]:1;
  const maxArea=d.areas[0]?d.areas[0][1]:1;
  const maxProc=d.procs[0]?d.procs[0][1]:1;

  function listItem(name, val, maxVal, color, unit=''){
    return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f4;">
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;color:#1a1d24;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
        <div style="background:#f0f0f4;border-radius:3px;height:4px;margin-top:4px;overflow:hidden">
          <div style="width:${(val/maxVal*100).toFixed(1)}%;height:100%;background:${color};border-radius:3px"></div>
        </div>
      </div>
      <span style="font-size:14px;font-weight:800;color:${color};flex-shrink:0">${val}${unit}</span>
    </div>`;
  }

  function numberedItem(i, name, val, barWidth, color, unit='', sub=null){
    return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f4;">
      <span style="font-size:10px;font-weight:700;color:#8b93a8;width:18px;text-align:right;flex-shrink:0">${i+1}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;color:#1a1d24;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
        <div style="background:#f0f0f4;border-radius:3px;height:4px;margin-top:4px;overflow:hidden">
          <div style="width:${Math.min(100,barWidth).toFixed(1)}%;height:100%;background:${color};border-radius:3px"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:14px;font-weight:800;color:${color};line-height:1.2">${val}${unit}</div>
        ${sub!==null?`<div style="font-size:10px;font-weight:500;color:#8b93a8;line-height:1.2">${sub} cx</div>`:''}
      </div>
    </div>`;
  }

  const areaList=d.areas.map((r,i)=>{
    const cx=Math.round(d.cirugias*r[1]/100);
    return numberedItem(i,r[0],cx,r[1],'#ba0170',' cx',r[1]+'%');
  }).join('');
  const procList=d.procs.slice(0,10).map((r,i)=>numberedItem(i,r[0],r[1],(r[1]/maxProc*100),'#5b4fcf')).join('');
  const cirTop=d.cirujanos.slice(0,10).map((r,i)=>numberedItem(i,r[0],r[1],(r[1]/maxCx*100),'#0d7a4e')).join('');
  const cirRest=d.cirujanos.slice(10).map((r,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f4;">
      <span style="font-size:10px;font-weight:600;color:#8b93a8;width:18px;text-align:right;flex-shrink:0">${i+11}</span>
      <div style="flex:1;font-size:12px;font-weight:600;color:#4a5068;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r[0]}</div>
      <span style="font-size:12px;font-weight:700;color:#4a5068;flex-shrink:0">${r[1]}</span>
    </div>`).join('');
  const instList=d.instrumental.map((r)=>listItem(r[0],r[1],maxInst,'#ba0170')).join('');

  return`
  <div class="section-title">Volumen</div>
  <div class="section-period">${d.label} · ${d.period}</div>

  <div class="vol-kpi-bar">
    <div class="vol-kpi-item">

      ${isAnterior?`<div class="vol-kpi-sub" style="color:${d.deltaCirc>=0?'#0d7a4e':'#ca8a04'}">${d.deltaCirc>=0?'↑':'↓'} ${Math.abs(d.deltaCirc)}% vs mes ant.</div>`:''}
    </div>
    <div class="vol-kpi-sep"></div>
    <div class="vol-kpi-item">
      <div class="vol-kpi-label">Agendadas</div>
      <div class="vol-kpi-val">${d.agendadas}</div>
      <div class="vol-kpi-sub">${d.agendamiento}% del total</div>
    </div>
    <div class="vol-kpi-sep"></div>
    <div class="vol-kpi-item">

      <div class="vol-kpi-val" style="color:#ca8a04">${d.sinAgendar}</div>
      <div class="vol-kpi-sub">${(100-d.agendamiento).toFixed(1)}% del total</div>
    </div>
    <div class="vol-kpi-sep"></div>
    <div class="vol-kpi-item">
      <div class="vol-kpi-label">Canceladas</div>
      <div class="vol-kpi-val" style="color:#ba0170">${d.cxCanceladas}</div>
      <div class="vol-kpi-sub">${((d.cxCanceladas/d.cxTotales)*100).toFixed(1)}% del total prog.</div>
    </div>
    <div class="vol-kpi-sep"></div>
    <div class="vol-kpi-item">
      <div class="vol-kpi-label">Total programadas</div>
      <div class="vol-kpi-val">${d.cxTotales}</div>
      <div class="vol-kpi-sub">realizadas + canceladas</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-card-title">Áreas con mayor volumen</div>
      <div class="chart-card-sub">${d.areas.length} especialidades · Cantidad de cirugías</div>
      ${areaList}
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Procedimientos más realizados</div>
      <div class="chart-card-sub">Top 10 · Cantidad</div>
      ${procList}
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-card-title">Cirujanos por volumen</div>
      <div class="chart-card-sub">Top 10 de ${d.cirujanos.length} · Cantidad de procedimientos</div>
      ${cirTop}
      ${cirRest?`<details style="margin-top:8px"><summary style="cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ba0170;padding:8px 0;user-select:none">Ver ${d.cirujanos.length-10} más ▾</summary>${cirRest}</details>`:''}
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Instrumental intraoperatorio</div>
      <div class="chart-card-sub">${d.instrumental.length} equipos · Cantidad de usos</div>
      ${instList}

  </div>
  ${buildVolumenTrimestral()}`;

function buildUtilizacion(d){
  const qCards=d.quirofanos?d.quirofanos.map((v,i)=>{
    const cls=v>=66?'best':v<=30?'worst':'mid';
    const color=v>=66?'#0d7a4e':v<=30?'#ca8a04':'#ba0170';
    return`<div class="q-card ${cls}"><div class="q-name">Quirófano ${i+1}${v>=66?' ★':''}</div><div class="q-pct" style="color:${color}">${v}%</div><div class="q-bar"><div class="q-fill" style="width:${Math.min(100,v)}%;background:${color}"></div></div></div>`;
  }).join(''):'<div style="color:#8b93a8;font-size:12px;padding:16px">Sin datos por quirófano este mes</div>';

  // Mejor día y mejor quirófano por día
  let bestDia=null, bestDiaUtil=0;
  let bestQ=null, bestQVal=0, bestQDia=null;
  if(d.diasSemana){
    d.diasSemana.forEach(r=>{
      if(r.util>bestDiaUtil){bestDiaUtil=r.util;bestDia=r.dia;}
      r.q.forEach((v,i)=>{
        if(v!==null&&v>bestQVal){bestQVal=v;bestQ=i+1;bestQDia=r.dia;}
      });
    });
  }
  const highlightNote = (bestDia&&bestQ)?`
  <div style="background:var(--good-bg);border:1px solid var(--good);border-left:4px solid var(--good);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;gap:32px;flex-wrap:wrap;align-items:center;">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:18px;">📅</span>
      <div>
        <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--good);margin-bottom:2px;">Mejor día del mes</div>
        <div style="font-size:18px;font-weight:900;color:var(--text-1);letter-spacing:-.5px;">${bestDia} <span style="font-size:13px;font-weight:700;color:var(--good)">${bestDiaUtil}%</span></div>
      </div>
    </div>
    <div style="width:1px;height:36px;background:var(--good);opacity:.3;"></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:18px;">🏆</span>
      <div>
        <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--good);margin-bottom:2px;">Mejor quirófano del mes</div>
        <div style="font-size:18px;font-weight:900;color:var(--text-1);letter-spacing:-.5px;">Q${bestQ} — ${bestQDia} <span style="font-size:13px;font-weight:700;color:var(--good)">${bestQVal}%</span></div>
      </div>
    </div>
  </div>`:'';

  return`
  <div class="section-title">Utilización</div>
  <div class="section-period">${d.label} · ${d.period}</div>
  ${highlightNote}
  <div class="cards-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="card">${tag('','Tasa utilización')}${metric(d.utilizacion<=30?'bad':d.utilizacion<=65?'warn':'good',d.utilizacion+'%')}<div class="card-desc">En disponibilidad</div>${semaforoHtml('utilizacion',d.utilizacion)}</div>
    <div class="card">${tag('purple','Hs utilizadas')}${metric('neutral',d.hsUtilizadas||'—')}<div class="card-desc">Dentro de disponibilidad</div></div>
    <div class="card">${tag('','Horas abiertas')}${metric('neutral',d.hsAbiertas||'—')}<div class="card-desc">Total disponible</div></div>
    <div class="card">${tag('','Oportunidad')}${metric('bad',d.hsDisponiblesNoUsadas||'—')}<div class="card-desc">Hs disponibles sin usar</div></div>
  </div>
  <div class="chart-card"><div class="chart-card-title">Utilización por quirófano (Q1–Q6)</div><div class="chart-card-sub">Tasa de ocupación · ≥66% verde · 31–65% rojo · ≤30% amarillo</div><div class="quirofano-grid" style="grid-template-columns:repeat(6,1fr);grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">${qCards}</div></div>
  <div class="charts-row">
    <div class="chart-card"><div class="chart-card-title">Distribución de horas</div><div class="chart-card-sub">Dentro y fuera de disponibilidad</div><canvas id="chartHorasDistrib"></canvas></div>
    <div class="chart-card"><div class="chart-card-title">Horas dentro vs fuera vs no utilizadas</div><div class="chart-card-sub">Total utilizado</div><canvas id="chartDentroFuera"></canvas></div>
  </div>
  <div class="chart-card" id="cardUtilDia">
    <div class="chart-card-title">Utilización por día de la semana</div>
    <div class="chart-card-sub">Tasa de ocupación diaria · Q1–Q6 · Verde ≥66% · Rojo 31–65% · Amarillo ≤30%</div>
    <canvas id="chartUtilDia" style="max-height:none;height:220px;margin-bottom:20px"></canvas>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
    <table class="data-table util-dia-table" style="margin-top:8px;min-width:520px">
      <thead>
        <tr>
          <th>Día</th>
          <th style="text-align:center">% Total</th>
          <th style="text-align:center">Q1</th>
          <th style="text-align:center">Q2</th>
          <th style="text-align:center">Q3</th>
          <th style="text-align:center">Q4</th>
          <th style="text-align:center">Q5</th>
          <th style="text-align:center">Q6</th>
        </tr>
      </thead>
      <tbody>
        ${d.diasSemana.map(r=>{
          function utilColor(v){return v>=66?'#0d7a4e':v>=31?'#ba0170':'#ca8a04';}
          const qCells=r.q.map(v=>v===null?'<td style="text-align:center;color:#8b93a8">—</td>':`<td style="text-align:center;font-weight:700;color:${utilColor(v)}">${v}%</td>`).join('');
          return`<tr><td class="hl">${r.dia}</td><td style="text-align:center;font-weight:800;font-size:14px;color:${utilColor(r.util)}">${r.util}%</td>${qCells}</tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  </div>
  ${buildUtilizacionTrimestral()}`;
}

function buildCancelacionesTrimestral(){
  var meses=Object.values(MONTHS);
  var n=meses.length;
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var year=meses[0].label.split(' ')[1];
  var thM=shortL.map(function(l){return'<th style="text-align:center">'+l+'</th>';}).join('');

  // ── KPI table ──
  function cColor(v){return v<=5?'#0d7a4e':v<=10?'#ba0170':'#ca8a04';}
  function kpiRow(label,getter,colorFn,unit){
    var vals=meses.map(getter);
    var best=Math.min.apply(null,vals);
    var cells=vals.map(function(v){
      var isBest=v===best;
      return'<td style="text-align:center;font-weight:'+(isBest?800:600)+';color:'+colorFn(v)+'">'+(isBest?'<strong>':'')+v+unit+(isBest?'</strong>':'')+'</td>';
    }).join('');
    return'<tr><td class="hl">'+label+'</td>'+cells+'</tr>';
  }

  // ── Cirujanos merge ──
  var cirMap={};
  meses.forEach(function(mes,mi){
    if(!mes.cancelaCirujanos) return;
    mes.cancelaCirujanos.forEach(function(r){
      var key=nameKey(r[0]);
      if(!cirMap[key]) cirMap[key]={nombre:r[0],vals:Array(n).fill(null)};
      else if(r[0].replace(/\./g,'').length>cirMap[key].nombre.replace(/\./g,'').length) cirMap[key].nombre=r[0];
      cirMap[key].vals[mi]=r[2];
    });
  });
  var cirRows=Object.values(cirMap).sort(function(a,b){
    return b.vals.reduce(function(s,v){return s+(v||0);},0)-a.vals.reduce(function(s,v){return s+(v||0);},0);
  }).map(function(cir){
    var total=cir.vals.reduce(function(s,v){return s+(v||0);},0);
    var cells=cir.vals.map(function(v){
      return v===null?'<td style="text-align:center;color:#8b93a8">—</td>':`<td style="text-align:center;font-weight:700;color:#ba0170">${v}</td>`;
    }).join('');
    return'<tr><td class="hl">'+cir.nombre+'</td>'+cells+'<td style="text-align:center;font-weight:800;color:#ba0170">'+total+'</td></tr>';
  }).join('');

  // ── Financiadores merge ──
  var finMap={};
  meses.forEach(function(mes){
    if(!mes.financiadoresCancela) return;
    mes.financiadoresCancela.forEach(function(r){
      finMap[r[0]]=(finMap[r[0]]||0)+r[1];
    });
  });
  var finRows=Object.entries(finMap).sort(function(a,b){return b[1]-a[1];}).map(function(e){
    return'<tr><td class="hl">'+e[0]+'</td><td style="text-align:center;font-weight:700;color:#ba0170">'+e[1]+'</td></tr>';
  }).join('');

  // ── Áreas merge ──
  var areaMap={};
  meses.forEach(function(mes){
    if(!mes.areasCancela) return;
    mes.areasCancela.forEach(function(r){
      areaMap[r[0]]=(areaMap[r[0]]||0)+r[1];
    });
  });
  var areaRows=Object.entries(areaMap).sort(function(a,b){return b[1]-a[1];}).map(function(e){
    return'<tr><td class="hl">'+e[0]+'</td><td style="text-align:center;font-weight:700">'+e[1]+'</td></tr>';
  }).join('');

  return''+
  '<div style="margin-top:28px;padding-top:24px;border-top:2px solid var(--border)">'+
    '<div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Resumen trimestral · Cancelaciones</div>'+
    '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:20px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:24px;height:2px;background:#ba0170"></span>'+shortL.join(' · ')+' '+year+'</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">KPIs de cancelaciones por mes</div>'+
    '<div class="chart-card-sub">✓ = mejor del período</div>'+
    '<div style="overflow-x:auto"><table class="data-table" style="min-width:360px">'+
      '<thead><tr><th>Indicador</th>'+thM+'</tr></thead>'+
      '<tbody>'+
        kpiRow('Tasa <48hs (%)',function(m){return m.cancelacion;},cColor,'%')+
        kpiRow('Canceladas <48hs',function(m){return m.cxCanceladas;},function(){return'#ba0170';},'')+
        kpiRow('Total canceladas (incl. >48hs)',function(m){return m.cxCanceladasTotal||m.cxCanceladas;},function(){return'#4a5068';},'')+
      '</tbody>'+
    '</table></div>'+
  '</div>'+
  '<div class="charts-row">'+
    '<div class="chart-card">'+
      '<div class="chart-card-title">Cirujanos con cancelaciones — trimestral</div>'+
      '<div class="chart-card-sub">Canceladas por mes · Total acumulado</div>'+
      '<div style="overflow-x:auto"><table class="data-table" style="min-width:400px">'+
        '<thead><tr><th>Cirujano</th>'+thM+'<th style="text-align:center">Total</th></tr></thead>'+
        '<tbody>'+cirRows+'</tbody>'+
      '</table></div>'+
    '</div>'+
    '<div class="chart-card">'+
      '<div class="chart-card-title">Cancelaciones por financiador — trimestral</div>'+
      '<div class="chart-card-sub">Acumulado '+shortL[0]+'→'+shortL[n-1]+'</div>'+
      '<table class="data-table">'+
        '<thead><tr><th>Financiador</th><th style="text-align:center">Total</th></tr></thead>'+
        '<tbody>'+finRows+'</tbody>'+
      '</table>'+
    '</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">Áreas con cancelaciones — trimestral</div>'+
    '<div class="chart-card-sub">Total acumulado '+shortL[0]+'→'+shortL[n-1]+'</div>'+
    '<table class="data-table">'+
      '<thead><tr><th>Área</th><th style="text-align:center">Total</th></tr></thead>'+
      '<tbody>'+areaRows+'</tbody>'+
    '</table>'+
  '</div>';
}

function buildCancelaciones(d){
  const totalCancela=d.cancelaCirujanos?d.cancelaCirujanos.reduce((s,r)=>s+r[2],0):d.cxCanceladas;
  const financRow=d.financiadoresCancela?d.financiadoresCancela.map(r=>`<tr><td class="hl">${r[0]}</td><td style="text-align:center;font-weight:700">${r[1]}</td></tr>`).join(''):'';
  const cirTop=d.cancelaCirujanos?d.cancelaCirujanos.slice(0,10).map(r=>`<tr>
    <td class="hl">${r[0]}</td>
    <td style="text-align:center;font-weight:700;color:#ba0170">${r[2]}</td>
    <td class="${parseFloat(r[3])>=20?'bad-val':parseFloat(r[3])>=10?'warn-val':'good-val'}" style="text-align:center;color:${parseFloat(r[3])>=20?'#ca8a04':parseFloat(r[3])>=10?'#ba0170':'#0d7a4e'}">${r[3]}</td>
  </tr>`).join(''):'';
  const cirRest=d.cancelaCirujanos&&d.cancelaCirujanos.length>10?`<details style="margin-top:8px"><summary style="cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ba0170;padding:8px 0;user-select:none">Ver ${d.cancelaCirujanos.length-10} más ▾</summary><table class="data-table"><thead><tr><th>Cirujano</th><th style="text-align:center">Canceladas</th><th style="text-align:center">%</th></tr></thead><tbody>${d.cancelaCirujanos.slice(10).map(r=>`<tr><td class="hl">${r[0]}</td><td style="text-align:center;font-weight:700;color:#ba0170">${r[2]}</td><td style="text-align:center;color:${parseFloat(r[3])>=20?'#ca8a04':parseFloat(r[3])>=10?'#ba0170':'#0d7a4e'}">${r[3]}</td></tr>`).join('')}</tbody></table></details>`:'';

  return`
  <div class="section-title">Cancelaciones</div>
  <div class="section-period">${d.label} · ${d.period}</div>
  <div class="cards-grid">
    <div class="card">${tag('','Tasa &lt;48hs')}${metric('bad',d.cancelacion+'%')}<div class="card-desc">Tasa cancelación &lt;48hs</div>${semaforoHtml('cancelacion',d.cancelacion)}</div>
    <div class="card">${tag('warn','Canceladas &lt;48hs')}${metric('warn',d.cxCanceladas)}<div class="card-desc">Dentro de las 48hs</div></div>
    <div class="card">${tag('','Total canceladas')}${metric('neutral',totalCancela)}<div class="card-desc">Incluyendo &gt;48hs</div></div>
    <div class="card">${tag('','Total programadas')}${metric('neutral',d.cxTotales)}<div class="card-desc">Realizadas + canceladas</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><div class="chart-card-title">Motivos de cancelación</div><div class="chart-card-sub">Cantidad de casos</div><canvas id="chartMotivos"></canvas></div>
    <div class="chart-card"><div class="chart-card-title">Anticipación de las cancelaciones</div><div class="chart-card-sub">% por tiempo de anticipación</div><canvas id="chartAnticipacion"></canvas></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><div class="chart-card-title">Áreas con más cancelaciones</div><div class="chart-card-sub">Cantidad de cx canceladas</div><canvas id="chartAreasCancela"></canvas></div>
    ${d.detallesCancela?`<div class="chart-card"><div class="chart-card-title">Detalle de motivos</div><div class="chart-card-sub">Desglose por subtipo</div><canvas id="chartDetalleCancela"></canvas></div>`:''}
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-card-title">Cirujanos con cancelaciones</div>
      <div class="chart-card-sub">Canceladas · % cancelación</div>
      <table class="data-table"><thead><tr><th>Cirujano</th><th style="text-align:center">Canceladas</th><th style="text-align:center">%</th></tr></thead>
      <tbody>${cirTop}</tbody></table>
      ${cirRest}
    </div>
    ${financRow?`<div class="chart-card">
      <div class="chart-card-title">Cancelaciones por financiador</div>
      <div class="chart-card-sub">Cantidad de cirugías canceladas</div>
      <table class="data-table"><thead><tr><th>Financiador</th><th style="text-align:center">Canceladas</th></tr></thead>
      <tbody>${financRow}</tbody></table>
    </div>`:''}
  </div>
  ${buildCancelacionesTrimestral()}`;
}

function buildEstimacionesTrimestral(){
  var meses=Object.values(MONTHS);
  var n=meses.length;
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var year=meses[0].label.split(' ')[1];
  var thM=shortL.map(function(l){return'<th style="text-align:center">'+l+'</th>';}).join('');

  function estColor(v){return v>=40?'#0d7a4e':v>=20?'#ba0170':'#ca8a04';}
  function subColor(v){return v<=20?'#0d7a4e':v<=40?'#ba0170':'#ca8a04';}
  function difColor(v){return v>=-15?'#0d7a4e':v>=-40?'#ba0170':'#ca8a04';}
  function hsColor(v){return v<=100?'#0d7a4e':v<=500?'#ba0170':'#ca8a04';}

  function kpiRow(label,getter,colorFn,unit,betterHigh){
    var vals=meses.map(getter);
    var best=betterHigh?Math.max.apply(null,vals):Math.min.apply(null,vals.map(Math.abs));
    var cells=vals.map(function(v){
      var isBest=betterHigh?(v===Math.max.apply(null,vals)):(Math.abs(v)===Math.min.apply(null,vals.map(Math.abs)));
      return'<td style="text-align:center;font-weight:'+(isBest?800:600)+';color:'+colorFn(v)+'">'+(isBest?'<strong>':'')+v+unit+(isBest?'</strong>':'')+'</td>';
    }).join('');
    return'<tr><td class="hl">'+label+'</td>'+cells+'</tr>';
  }

  // Cirujanos merge — desvío acumulado
  var cirMap={};
  meses.forEach(function(mes,mi){
    if(!mes.estimCirujanos) return;
    mes.estimCirujanos.forEach(function(r){
      var key=nameKey(r[0]);
      if(!cirMap[key]) cirMap[key]={nombre:r[0],acum:Array(n).fill(null)};
      else if(r[0].replace(/\./g,'').length>cirMap[key].nombre.replace(/\./g,'').length) cirMap[key].nombre=r[0];
      cirMap[key].acum[mi]=r[3];
    });
  });
  var cirRows=Object.values(cirMap).sort(function(a,b){
    var ta=a.acum.reduce(function(s,v){return s+(v||0);},0);
    var tb=b.acum.reduce(function(s,v){return s+(v||0);},0);
    return tb-ta;
  }).map(function(cir){
    var total=cir.acum.reduce(function(s,v){return s+(v||0);},0);
    var cells=cir.acum.map(function(v){
      return v===null?'<td style="text-align:center;color:#8b93a8">—</td>':`<td style="text-align:center;font-weight:600;color:#ca8a04">${Number(v).toLocaleString('es-AR')}</td>`;
    }).join('');
    return'<tr><td class="hl">'+cir.nombre+'</td>'+cells+'<td style="text-align:center;font-weight:800;color:#ca8a04">'+Number(total).toLocaleString('es-AR')+'</td></tr>';
  }).join('');

  return''+
  '<div style="margin-top:28px;padding-top:24px;border-top:2px solid var(--border)">'+
    '<div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Resumen trimestral · Estimaciones</div>'+
    '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:20px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:24px;height:2px;background:#ba0170"></span>'+shortL.join(' · ')+' '+year+'</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">KPIs de estimaciones por mes</div>'+
    '<div class="chart-card-sub">✓ = mejor del período</div>'+
    '<div style="overflow-x:auto"><table class="data-table" style="min-width:360px">'+
      '<thead><tr><th>Indicador</th>'+thM+'</tr></thead>'+
      '<tbody>'+
        kpiRow('Estimación ONTIME (%)',function(m){return m.estimacion;},estColor,'%',true)+
        kpiRow('Subestimadas (%)',function(m){return m.subestimadas;},subColor,'%',false)+
        kpiRow('Sobreestimadas (%)',function(m){return m.sobreestimadas;},subColor,'%',false)+
        kpiRow('Diferencia prom. (min)',function(m){return m.difEstim;},difColor,' min',false)+
        kpiRow('Hs acum. subestimación',function(m){return m.hsAtraso;},hsColor,' hs',false)+
        kpiRow('Estimación prom. (min)',function(m){return m.estimProm;},function(){return'#4a5068';},' min',false)+
        kpiRow('Duración real prom. (min)',function(m){return m.durRealProm;},function(){return'#4a5068';},' min',false)+
      '</tbody>'+
    '</table></div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">Cirujanos con mayor desvío acumulado — trimestral</div>'+
    '<div class="chart-card-sub">Hs de atraso acumuladas por subestimación · por mes y total</div>'+
    '<div style="overflow-x:auto"><table class="data-table" style="min-width:400px">'+
      '<thead><tr><th>Cirujano</th>'+thM+'<th style="text-align:center">Total acum.</th></tr></thead>'+
      '<tbody>'+cirRows+'</tbody>'+
    '</table></div>'+
  '</div>';
}

function buildAtrasosTrimestral(){
  var meses=Object.values(MONTHS);
  var n=meses.length;
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var year=meses[0].label.split(' ')[1];

  // ── Tabla KPIs por mes ──
  function atrasoHex(v){return v<=30?'#0d7a4e':v<=45?'#ba0170':'#ca8a04';}
  function demHex(v){return v<=50?'#0d7a4e':v<=65?'#ba0170':'#ca8a04';}
  function ontimeHex(v){return v>=66?'#0d7a4e':v>=40?'#ba0170':'#ca8a04';}

  var thMeses=shortL.map(function(l){return'<th style="text-align:center">'+l+'</th>';}).join('');

  function kpiRow(label,getter,colorFn,unit){
    var vals=meses.map(getter);
    var best=vals.reduce(function(b,v,i){return colorFn(v)==='#0d7a4e'&&colorFn(b)==='#0d7a4e'?b:colorFn(v)==='#0d7a4e'?v:b;},null);
    var cells=vals.map(function(v){
      var isBest=v===Math.min.apply(null,vals)&&label.indexOf('Demoradas')>=0||v===Math.max.apply(null,vals)&&label.indexOf('Ontime')>=0||v===Math.min.apply(null,vals)&&label.indexOf('traso')>=0;
      return'<td style="text-align:center;font-weight:'+(isBest?800:600)+';color:'+colorFn(v)+'">'+(isBest?'<strong>':'')+v+unit+(isBest?'</strong>':'')+'</td>';
    }).join('');
    return'<tr><td class="hl">'+label+'</td>'+cells+'</tr>';
  }

  // ── Tabla trimestral de cirujanos (merge top 10 de cada mes) ──
  var cirMap={};
  meses.forEach(function(mes,mi){
    mes.atrasosCirujanos.forEach(function(r){
      var key=nameKey(r[0]);
      if(!cirMap[key]) cirMap[key]={nombre:r[0],datos:Array(n).fill(null)};
      else if(r[0].replace(/\./g,'').length>cirMap[key].nombre.replace(/\./g,'').length) cirMap[key].nombre=r[0];
      cirMap[key].datos[mi]={cx:r[1],dem:r[2],propio:r[3]};
    });
  });
  var cirRows=Object.values(cirMap).sort(function(a,b){
    var ta=a.datos.reduce(function(s,d){return s+(d?d.cx:0);},0);
    var tb=b.datos.reduce(function(s,d){return s+(d?d.cx:0);},0);
    return tb-ta;
  }).map(function(cir){
    var totalCx=cir.datos.reduce(function(s,d){return s+(d?d.cx:0);},0);
    var propioVals=cir.datos.filter(Boolean).map(function(d){return d.propio;});
    var avgPropio=propioVals.length>0?Math.round(propioVals.reduce(function(s,v){return s+v;},0)/propioVals.length):null;
    var cells=cir.datos.map(function(d){
      if(!d) return'<td style="text-align:center;color:#8b93a8">—</td>';
      return'<td style="text-align:center"><span style="font-weight:700">'+d.cx+' cx</span><br><span style="font-size:10px;color:'+demHex(parseInt(d.dem))+'">'+d.dem+'</span></td>';
    }).join('');
    var propioColor=avgPropio?atrasoHex(avgPropio):'#8b93a8';
    return'<tr><td class="hl">'+cir.nombre+'</td>'+cells+
      '<td style="text-align:center;font-weight:800;color:'+propioColor+'">'+(avgPropio||'—')+' min</td>'+
      '<td style="text-align:center;font-weight:700;color:#ba0170">'+totalCx+'</td>'+
    '</tr>';
  }).join('');

  var thCirMeses=shortL.map(function(l){return'<th style="text-align:center">'+l+'<div style="font-size:8px;font-weight:500;opacity:.7">Cx · % dem.</div></th>';}).join('');

  return''+
  '<div style="margin-top:28px;padding-top:24px;border-top:2px solid var(--border)">'+
    '<div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Resumen trimestral · Atrasos</div>'+
    '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:20px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:24px;height:2px;background:#ba0170"></span>'+shortL.join(' · ')+' '+year+'</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">KPIs de atrasos por mes</div>'+
    '<div class="chart-card-sub">✓ = mejor del período · Umbral verde: atraso ≤30 min · demoradas ≤50% · ontime ≥66%</div>'+
    '<div style="overflow-x:auto">'+
    '<table class="data-table" style="min-width:360px">'+
      '<thead><tr><th>Indicador</th>'+thMeses+'</tr></thead>'+
      '<tbody>'+
        kpiRow('Atraso total (min)',function(m){return m.atraso;},atrasoHex,' min')+
        kpiRow('Atraso propio (min)',function(m){return m.atrasoPropio;},atrasoHex,' min')+
        kpiRow('Cx demoradas (%)',function(m){return m.cxDemoradas;},demHex,'%')+
        kpiRow('Inicio ontime (%)',function(m){return m.iniciOntime;},ontimeHex,'%')+
        kpiRow('Adelantadas (%)',function(m){return m.adelantadas;},ontimeHex,'%')+
        kpiRow('En horario (%)',function(m){return m.enHorario;},ontimeHex,'%')+
      '</tbody>'+
    '</table>'+
    '</div>'+
  '</div>'+
  '<div class="chart-card" style="margin-top:4px">'+
    '<div class="chart-card-title">Cirujanos con mayor impacto en atrasos — resumen trimestral</div>'+
    '<div class="chart-card-sub">Cx realizadas y % demoradas por mes · Atraso propio promedio · Total cx del período</div>'+
    '<div style="overflow-x:auto">'+

function buildCalidadTrimestral(){
  var meses=Object.values(MONTHS);
  var n=meses.length;
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var year=meses[0].label.split(' ')[1];
  var thM=shortL.map(function(l){return'<th style="text-align:center">'+l+'</th>';}).join('');

  function calColor(v){return v>=90?'#0d7a4e':v>=80?'#ba0170':'#ca8a04';}
  function invColor(v){return v===0?'#0d7a4e':v<=5?'#ba0170':'#ca8a04';}

  function kpiRow(label,getter,colorFn,unit,betterHigh){
    var vals=meses.map(getter);
    var best=betterHigh?Math.max.apply(null,vals):Math.min.apply(null,vals);
    var cells=vals.map(function(v){
      var isBest=v===best;
      return'<td style="text-align:center;font-weight:'+(isBest?800:600)+';color:'+colorFn(v)+'">'+(isBest?'<strong>':'')+v+unit+(isBest?'</strong>':'')+'</td>';
    }).join('');
    return'<tr><td class="hl">'+label+'</td>'+cells+'</tr>';
  }

  return''+
  '<div style="margin-top:28px;padding-top:24px;border-top:2px solid var(--border)">'+
    '<div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Resumen trimestral · Calidad de Datos</div>'+
    '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:20px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:24px;height:2px;background:#ba0170"></span>'+shortL.join(' · ')+' '+year+'</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">KPIs de calidad por mes</div>'+
    '<div class="chart-card-sub">✓ = mejor del período · Umbral verde ≥90% · rojo 80–90% · amarillo <80%</div>'+
    '<div style="overflow-x:auto"><table class="data-table" style="min-width:360px">'+
      '<thead><tr><th>Indicador</th>'+thM+'</tr></thead>'+
      '<tbody>'+
        kpiRow('Data completa (%)',function(m){return m.calidad;},calColor,'%',true)+
        kpiRow('Apertura completa (%)',function(m){return m.apertura;},calColor,'%',true)+
        kpiRow('Cierre completo (%)',function(m){return m.cierre;},calColor,'%',true)+
        kpiRow('Duración <24hs (%)',function(m){return m.duracion24;},calColor,'%',true)+
        kpiRow('Fecha programada OK (%)',function(m){return m.fechaOk;},calColor,'%',true)+
        kpiRow('Cx UP distinta',function(m){return m.cxUPdistinta;},invColor,'',false)+
        kpiRow('Apertura/cierre >24hs',function(m){return m.aperturaCierre24;},invColor,'',false)+
        kpiRow('Fecha distinta',function(m){return m.cxFechaDistinta;},invColor,'',false)+
      '</tbody>'+
    '</table></div>'+
  '</div>';
}

function buildAtrasosTrimestral(){
  var meses=Object.values(MONTHS);
  var n=meses.length;
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var year=meses[0].label.split(' ')[1];

  // ── Tabla KPIs por mes ──
  function atrasoHex(v){return v<=30?'#0d7a4e':v<=45?'#ba0170':'#ca8a04';}
  function demHex(v){return v<=50?'#0d7a4e':v<=65?'#ba0170':'#ca8a04';}
  function ontimeHex(v){return v>=66?'#0d7a4e':v>=40?'#ba0170':'#ca8a04';}

  var thMeses=shortL.map(function(l){return'<th style="text-align:center">'+l+'</th>';}).join('');

  function kpiRow(label,getter,colorFn,unit){
    var vals=meses.map(getter);
    var best=vals.reduce(function(b,v,i){return colorFn(v)==='#0d7a4e'&&colorFn(b)==='#0d7a4e'?b:colorFn(v)==='#0d7a4e'?v:b;},null);
    var cells=vals.map(function(v){
      var isBest=v===Math.min.apply(null,vals)&&label.indexOf('Demoradas')>=0||v===Math.max.apply(null,vals)&&label.indexOf('Ontime')>=0||v===Math.min.apply(null,vals)&&label.indexOf('traso')>=0;
      return'<td style="text-align:center;font-weight:'+(isBest?800:600)+';color:'+colorFn(v)+'">'+(isBest?'<strong>':'')+v+unit+(isBest?'</strong>':'')+'</td>';
    }).join('');
    return'<tr><td class="hl">'+label+'</td>'+cells+'</tr>';
  }

  // ── Tabla trimestral de cirujanos (merge top 10 de cada mes) ──
  var cirMap={};
  meses.forEach(function(mes,mi){
    mes.atrasosCirujanos.forEach(function(r){
      var key=nameKey(r[0]);
      if(!cirMap[key]) cirMap[key]={nombre:r[0],datos:Array(n).fill(null)};
      else if(r[0].replace(/\./g,'').length>cirMap[key].nombre.replace(/\./g,'').length) cirMap[key].nombre=r[0];
      cirMap[key].datos[mi]={cx:r[1],dem:r[2],propio:r[3]};
    });
  });
  var cirRows=Object.values(cirMap).sort(function(a,b){
    var ta=a.datos.reduce(function(s,d){return s+(d?d.cx:0);},0);
    var tb=b.datos.reduce(function(s,d){return s+(d?d.cx:0);},0);
    return tb-ta;
  }).map(function(cir){
    var totalCx=cir.datos.reduce(function(s,d){return s+(d?d.cx:0);},0);
    var propioVals=cir.datos.filter(Boolean).map(function(d){return d.propio;});
    var avgPropio=propioVals.length>0?Math.round(propioVals.reduce(function(s,v){return s+v;},0)/propioVals.length):null;
    var cells=cir.datos.map(function(d){
      if(!d) return'<td style="text-align:center;color:#8b93a8">—</td>';
      return'<td style="text-align:center"><span style="font-weight:700">'+d.cx+' cx</span><br><span style="font-size:10px;color:'+demHex(parseInt(d.dem))+'">'+d.dem+'</span></td>';
    }).join('');
    var propioColor=avgPropio?atrasoHex(avgPropio):'#8b93a8';
    return'<tr><td class="hl">'+cir.nombre+'</td>'+cells+
      '<td style="text-align:center;font-weight:800;color:'+propioColor+'">'+(avgPropio||'—')+' min</td>'+
      '<td style="text-align:center;font-weight:700;color:#ba0170">'+totalCx+'</td>'+
    '</tr>';
  }).join('');

  var thCirMeses=shortL.map(function(l){return'<th style="text-align:center">'+l+'<div style="font-size:8px;font-weight:500;opacity:.7">Cx · % dem.</div></th>';}).join('');

  return''+
  '<div style="margin-top:28px;padding-top:24px;border-top:2px solid var(--border)">'+
    '<div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Resumen trimestral · Atrasos</div>'+
    '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:20px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:24px;height:2px;background:#ba0170"></span>'+shortL.join(' · ')+' '+year+'</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">KPIs de atrasos por mes</div>'+
    '<div class="chart-card-sub">✓ = mejor del período · Umbral verde: atraso ≤30 min · demoradas ≤50% · ontime ≥66%</div>'+
    '<div style="overflow-x:auto">'+
    '<table class="data-table" style="min-width:360px">'+
      '<thead><tr><th>Indicador</th>'+thMeses+'</tr></thead>'+
      '<tbody>'+
        kpiRow('Atraso total (min)',function(m){return m.atraso;},atrasoHex,' min')+
        kpiRow('Atraso propio (min)',function(m){return m.atrasoPropio;},atrasoHex,' min')+
        kpiRow('Cx demoradas (%)',function(m){return m.cxDemoradas;},demHex,'%')+
        kpiRow('Inicio ontime (%)',function(m){return m.iniciOntime;},ontimeHex,'%')+
        kpiRow('Adelantadas (%)',function(m){return m.adelantadas;},ontimeHex,'%')+
        kpiRow('En horario (%)',function(m){return m.enHorario;},ontimeHex,'%')+
      '</tbody>'+
    '</table>'+
    '</div>'+
  '</div>'+
  '<div class="chart-card" style="margin-top:4px">'+
    '<div class="chart-card-title">Cirujanos con mayor impacto en atrasos — resumen trimestral</div>'+
    '<div class="chart-card-sub">Cx realizadas y % demoradas por mes · Atraso propio promedio · Total cx del período</div>'+
    '<div style="overflow-x:auto">'+
    '<table class="data-table" style="min-width:500px">'+
      '<thead><tr>'+
        '<th>Cirujano</th>'+thCirMeses+
        '<th style="text-align:center">Atraso propio prom.</th>'+
        '<th style="text-align:center">Total cx</th>'+
      '</tr></thead>'+
      '<tbody>'+cirRows+'</tbody>'+
    '</table>'+
    '</div>'+
  '</div>';
}

function buildCalidadTrimestral(){
  var meses=Object.values(MONTHS);
  var n=meses.length;
  var shortL=meses.map(function(m){return m.label.split(' ')[0];});
  var year=meses[0].label.split(' ')[1];
  var thM=shortL.map(function(l){return'<th style="text-align:center">'+l+'</th>';}).join('');

  function calColor(v){return v>=90?'#0d7a4e':v>=80?'#ba0170':'#ca8a04';}
  function invColor(v){return v===0?'#0d7a4e':v<=5?'#ba0170':'#ca8a04';}

  function kpiRow(label,getter,colorFn,unit,betterHigh){
    var vals=meses.map(getter);
    var best=betterHigh?Math.max.apply(null,vals):Math.min.apply(null,vals);
    var cells=vals.map(function(v){
      var isBest=v===best;
      return'<td style="text-align:center;font-weight:'+(isBest?800:600)+';color:'+colorFn(v)+'">'+(isBest?'<strong>':'')+v+unit+(isBest?'</strong>':'')+'</td>';
    }).join('');
    return'<tr><td class="hl">'+label+'</td>'+cells+'</tr>';
  }

  return''+
  '<div style="margin-top:28px;padding-top:24px;border-top:2px solid var(--border)">'+
    '<div style="font-size:18px;font-weight:800;color:var(--text-1);letter-spacing:-.5px;margin-bottom:4px">Resumen trimestral · Calidad de Datos</div>'+
    '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:20px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:24px;height:2px;background:#ba0170"></span>'+shortL.join(' · ')+' '+year+'</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-card-title">KPIs de calidad por mes</div>'+
    '<div class="chart-card-sub">✓ = mejor del período · Umbral verde ≥90% · rojo 80–90% · amarillo <80%</div>'+
    '<div style="overflow-x:auto"><table class="data-table" style="min-width:360px">'+
      '<thead><tr><th>Indicador</th>'+thM+'</tr></thead>'+
      '<tbody>'+
        kpiRow('Data completa (%)',function(m){return m.calidad;},calColor,'%',true)+
        kpiRow('Apertura completa (%)',function(m){return m.apertura;},calColor,'%',true)+
        kpiRow('Cierre completo (%)',function(m){return m.cierre;},calColor,'%',true)+
        kpiRow('Duración <24hs (%)',function(m){return m.duracion24;},calColor,'%',true)+
        kpiRow('Fecha programada OK (%)',function(m){return m.fechaOk;},calColor,'%',true)+
        kpiRow('Cx UP distinta',function(m){return m.cxUPdistinta;},invColor,'',false)+
        kpiRow('Apertura/cierre >24hs',function(m){return m.aperturaCierre24;},invColor,'',false)+
        kpiRow('Fecha distinta',function(m){return m.cxFechaDistinta;},invColor,'',false)+
      '</tbody>'+
    '</table></div>'+
  '</div>';
}
