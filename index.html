<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAF Analytics — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#1a1d24;
  font-family:'Montserrat','Calibri',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  background:#ffffff;
  border-radius:20px;
  padding:44px 40px 40px;
  width:380px;
  max-width:100%;
  box-shadow:0 32px 80px rgba(0,0,0,.45);
  text-align:center;
}
.logo{font-size:22px;font-weight:900;color:#ba0170;letter-spacing:-.5px;line-height:1;}
.logo-sub{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8b93a8;margin-top:6px;margin-bottom:6px;}
.inst{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#1a1d24;margin-bottom:32px;}
.divider{width:40px;height:3px;background:#ba0170;border-radius:2px;margin:0 auto 28px;}

.form-group{margin-bottom:14px;text-align:left;}
.form-group label{display:block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b93a8;margin-bottom:6px;}
.form-group input{
  width:100%;
  font-family:'Montserrat','Calibri',sans-serif;
  font-size:14px;
  font-weight:600;
  color:#1a1d24;
  border:1.5px solid #e2e5ea;
  border-radius:8px;
  padding:12px 14px;
  transition:border .15s;
  background:#f4f5f7;
}
.form-group input:focus{outline:none;border-color:#ba0170;background:#fff;box-shadow:0 0 0 3px rgba(186,1,112,.1);}
.form-group input.error{border-color:#ca8a04;background:#fefce8;}

.error-msg{font-size:11px;font-weight:600;color:#ca8a04;min-height:18px;margin-bottom:10px;text-align:center;}

.btn-login{
  width:100%;
  font-family:'Montserrat','Calibri',sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:2px;
  text-transform:uppercase;
  border:none;
  border-radius:8px;
  padding:14px;
  cursor:pointer;
  background:#ba0170;
  color:#fff;
  margin-top:4px;
  transition:background .15s;
}
.btn-login:hover{background:#8f0055;}
.btn-login:disabled{background:#d0d4dc;cursor:not-allowed;}

.footer{margin-top:28px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#d0d4dc;}
.setup-hint{font-size:12px;color:#4a5068;line-height:1.7;margin-bottom:20px;}
.setup-hint strong{color:#ba0170;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Estadísticas</div>
  <div class="logo-sub">Centro Quirúrgico</div>
  <div class="inst">Instituto Alexander Fleming</div>
  <div class="divider"></div>

  <!-- LOGIN -->
  <div id="login-form">
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="usr" autocomplete="username" placeholder="Usuario">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="pwd" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="error-msg" id="err-msg"></div>
    <button class="btn-login" id="btn-enter" onclick="doLogin()">Ingresar</button>
  </div>

  <!-- SETUP (primera vez) -->
  <div id="setup-form" style="display:none;">
    <p class="setup-hint">Configuración inicial. Solo el usuario <strong>eroldan</strong> puede crear el acceso.</p>
    <div class="form-group">
      <label>Nombre de usuario</label>
      <input type="text" id="usr-new" autocomplete="username" placeholder="Ej: ezequiel">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="pwd-new" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="pwd-confirm" placeholder="Repetí la contraseña">
    </div>
    <div class="error-msg" id="setup-err"></div>
    <button class="btn-login" id="btn-setup" onclick="doSetup()">Crear acceso</button>
  </div>

  <div class="footer">Centro Quirúrgico · Acceso restringido</div>
</div>

<script>
async function sha256(text){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

function init(){
  if(sessionStorage.getItem('IAF_UNLOCKED')==='1'){
    window.location.href='iaf_analytics.html';
    return;
  }
  var hasCredentials=!!(localStorage.getItem('IAF_PWD_HASH')&&localStorage.getItem('IAF_USR_HASH'));
  if(hasCredentials){
    document.getElementById('login-form').style.display='block';
    document.getElementById('setup-form').style.display='none';
    document.getElementById('usr').focus();
    document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  } else {
    document.getElementById('login-form').style.display='none';
    document.getElementById('setup-form').style.display='block';
    document.getElementById('usr-new').focus();
    document.getElementById('pwd-confirm').addEventListener('keydown',function(e){if(e.key==='Enter')doSetup();});
  }
}

function getApiUrl(){return(localStorage.getItem('IAF_API_URL')||'').replace(/\/$/,'');}

async function doLogin(){
  var usrEl=document.getElementById('usr');
  var pwdEl=document.getElementById('pwd');
  var btn=document.getElementById('btn-enter');
  var err=document.getElementById('err-msg');
  usrEl.classList.remove('error');pwdEl.classList.remove('error');err.textContent='';
  if(!usrEl.value||!pwdEl.value){
    if(!usrEl.value)usrEl.classList.add('error');
    if(!pwdEl.value)pwdEl.classList.add('error');
    return;
  }
  btn.textContent='Verificando...';btn.disabled=true;
  var usrNorm=usrEl.value.trim().toLowerCase();
  var usrHash=await sha256(usrNorm);
  var pwdHash=await sha256(pwdEl.value);

  // 1. Try D1 via /auth (primary path)
  var apiUrl=getApiUrl();
  if(apiUrl){
    try{
      var res=await fetch(apiUrl+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usrHash:usrHash,pwdHash:pwdHash})});
      var data=await res.json();
      if(data.valid){
        sessionStorage.setItem('IAF_UNLOCKED','1');
        sessionStorage.setItem('IAF_CURRENT_USR',data.label||usrNorm);
        if(data.isAdmin){sessionStorage.setItem('IAF_IS_ADMIN','1');sessionStorage.setItem('IAF_SH_U',usrHash);sessionStorage.setItem('IAF_SH_P',pwdHash);}
        btn.textContent='✓ Acceso concedido';
        setTimeout(function(){window.location.href='iaf_analytics.html';},400);
        return;
      }
    }catch(e){}
  }

  // 2. Fallback: localStorage (eroldan only — admin access)
  if(usrHash===localStorage.getItem('IAF_USR_HASH')&&pwdHash===localStorage.getItem('IAF_PWD_HASH')){
    sessionStorage.setItem('IAF_UNLOCKED','1');
    sessionStorage.setItem('IAF_CURRENT_USR',usrNorm);
    sessionStorage.setItem('IAF_IS_ADMIN','1');
    sessionStorage.setItem('IAF_SH_U',usrHash);
    sessionStorage.setItem('IAF_SH_P',pwdHash);
    btn.textContent='✓ Acceso concedido';
    setTimeout(function(){window.location.href='iaf_analytics.html';},400);
    return;
  }

  err.textContent='Usuario o contraseña incorrectos';
  usrEl.classList.add('error');pwdEl.classList.add('error');
  pwdEl.value='';
  btn.textContent='Ingresar';btn.disabled=false;
  usrEl.focus();
}

async function doSetup(){
  var usrEl=document.getElementById('usr-new');
  var p1=document.getElementById('pwd-new');
  var p2=document.getElementById('pwd-confirm');
  var err=document.getElementById('setup-err');
  var btn=document.getElementById('btn-setup');
  err.textContent='';
  usrEl.classList.remove('error');p1.classList.remove('error');p2.classList.remove('error');
  var usrNorm=usrEl.value.trim().toLowerCase();
  if(!usrNorm){err.textContent='El usuario no puede estar vacío';usrEl.classList.add('error');usrEl.focus();return;}
  if(usrNorm!=='eroldan'){err.textContent='Solo el usuario eroldan puede configurar el acceso inicial.';usrEl.classList.add('error');usrEl.focus();btn.textContent='Crear acceso';btn.disabled=false;return;}
  if(p1.value.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres';p1.classList.add('error');p1.focus();return;}
  if(p1.value!==p2.value){err.textContent='Las contraseñas no coinciden';p2.classList.add('error');p2.focus();return;}
  btn.textContent='Guardando...';btn.disabled=true;
  var usrHash=await sha256(usrNorm);
  var pwdHash=await sha256(p1.value);
  // Always store in localStorage as fallback
  localStorage.setItem('IAF_USR_HASH',usrHash);
  localStorage.setItem('IAF_PWD_HASH',pwdHash);
  // Register in D1 if API is configured
  var apiUrl=getApiUrl();
  if(apiUrl){
    try{
      await fetch(apiUrl+'/users',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Admin-Usr':usrHash,'X-Admin-Pwd':pwdHash},
        body:JSON.stringify({usrHash:usrHash,pwdHash:pwdHash,label:'eroldan',isAdmin:true})
      });
    }catch(e){}
  }
  sessionStorage.setItem('IAF_UNLOCKED','1');
  sessionStorage.setItem('IAF_CURRENT_USR','eroldan');
  sessionStorage.setItem('IAF_IS_ADMIN','1');
  sessionStorage.setItem('IAF_SH_U',usrHash);
  sessionStorage.setItem('IAF_SH_P',pwdHash);
  btn.textContent='✓ Listo';
  setTimeout(function(){window.location.href='iaf_analytics.html';},400);
}

window.addEventListener('load',init);
</script>
</body>
</html>
